<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Price Engine Admin</title>
<style>
  :root { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --dim: #86868b; --accent: #0071e3; --green: #34c759; --red: #ff3b30; --border: #d2d2d7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 14px; margin-bottom: 32px; }

  .card { background: var(--card); border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .card h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  input[type="text"], select { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: border .2s; }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }

  .row { display: flex; gap: 16px; align-items: flex-end; }
  .row > * { flex: 1; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; font-size: 15px; font-weight: 600; border: none; border-radius: 980px; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #0077ed; }
  .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #2db84e; }
  .btn-success:disabled { background: var(--border); cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: #f0f0f0; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }

  .checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; }
  .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; text-transform: none; letter-spacing: 0; cursor: pointer; }
  .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }

  .status { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 12px; }
  .status-info { background: #e8f4fd; color: #0a5a8a; }
  .status-success { background: #e8f8ed; color: #1a7a3a; }
  .status-error { background: #fde8e8; color: #a51a1a; }
  .status-loading { background: #f0f0f0; color: var(--dim); }

  #variants-container { display: none; }
  .variant-list { max-height: 500px; overflow-y: auto; }
  .variant-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .variant-item:last-child { border-bottom: none; }
  .variant-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
  .variant-name { font-size: 14px; flex: 1; }
  .variant-price { font-size: 14px; font-weight: 600; color: var(--green); white-space: nowrap; }
  .variant-attrs { font-size: 12px; color: var(--dim); }

  .select-actions { display: flex; gap: 8px; margin-bottom: 12px; }

  #settings-panel { display: none; }
  .settings-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 12px; }
  .settings-row > div { flex: 1; }

  .token-info { font-size: 12px; color: var(--dim); margin-top: 8px; }

  .json-preview { background: #1d1d1f; color: #e5e5ea; border-radius: 8px; padding: 16px; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; overflow-x: auto; white-space: pre; max-height: 200px; overflow-y: auto; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Price Engine Admin</h1>
  <p class="subtitle">Produkte zur zentralen Preisdatenbank hinzufügen</p>

  <!-- Settings -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>Einstellungen</h2>
      <button class="btn btn-outline btn-sm" onclick="toggleSettings()">Anzeigen</button>
    </div>
    <div id="settings-panel">
      <div class="settings-row">
        <div>
          <label>Keepa API Key</label>
          <input type="text" id="keepa-key" placeholder="Keepa API Key eingeben ..." value="">
        </div>
        <div>
          <label>GitHub Token (PAT)</label>
          <input type="text" id="gh-token" placeholder="ghp_... (für workflow_dispatch)">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-outline btn-sm" onclick="saveSettings()">Speichern (localStorage)</button>
        <button class="btn btn-outline btn-sm" onclick="clearSettings()">Löschen</button>
      </div>
      <p class="token-info">Keys werden nur lokal im Browser gespeichert (localStorage). Nie an Dritte übermittelt.</p>
    </div>
  </div>

  <!-- Product Input -->
  <div class="card">
    <h2>Produkt suchen</h2>
    <div class="row">
      <div style="flex:3;">
        <label>Amazon URL oder ASIN</label>
        <input type="text" id="product-input" placeholder="https://www.amazon.de/dp/B0DZDB7GQZ oder B0DZDB7GQZ">
      </div>
      <div style="flex:0 0 auto;">
        <button class="btn btn-primary" id="search-btn" onclick="searchProduct()">Suchen</button>
      </div>
    </div>
    <div id="search-status"></div>
  </div>

  <!-- Variants -->
  <div class="card" id="variants-container">
    <h2 id="variants-title">Varianten</h2>
    <div class="select-actions">
      <button class="btn btn-outline btn-sm" onclick="selectAll()">Alle auswählen</button>
      <button class="btn btn-outline btn-sm" onclick="selectNone()">Keine</button>
      <span style="flex:1;"></span>
      <span id="variant-count" style="font-size:13px;color:var(--dim);align-self:center;"></span>
    </div>
    <div class="variant-list" id="variant-list"></div>
  </div>

  <!-- Source & Category -->
  <div class="card" id="options-container" style="display:none;">
    <h2>Zuordnung</h2>
    <div style="margin-bottom:16px;">
      <label>Sources</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="src-apfeltalk" value="apfeltalk"> Apfeltalk</label>
        <label><input type="checkbox" id="src-macwelt" value="macwelt"> Macwelt</label>
        <label><input type="checkbox" id="src-price-tracker" value="price-tracker" checked> Price-Tracker</label>
      </div>
    </div>
    <div style="margin-bottom:16px;">
      <label>Apfeltalk-Kategorie <span style="font-weight:400;text-transform:none;">(nur bei Apfeltalk-Source)</span></label>
      <select id="at-category" disabled>
        <option value="">— Keine —</option>
        <option value="iphone">iPhone</option>
        <option value="mac">Mac</option>
        <option value="ipad">iPad</option>
        <option value="watch">Watch</option>
        <option value="airpods">AirPods</option>
        <option value="tv_home">TV &amp; HomePod</option>
        <option value="zubehoer">Zubehör</option>
      </select>
    </div>
  </div>

  <!-- Submit -->
  <div class="card" id="submit-container" style="display:none;">
    <div style="display:flex;gap:12px;align-items:center;">
      <button class="btn btn-success" id="submit-btn" onclick="submitProducts()">Hinzufügen</button>
      <button class="btn btn-outline" onclick="showJson()">JSON anzeigen</button>
      <span id="selected-count" style="font-size:13px;color:var(--dim);"></span>
    </div>
    <div class="json-preview" id="json-preview"></div>
    <div id="submit-status"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allVariants = [];
let parentAsin = '';
let parentProduct = null;

// ── Settings ───────────────────────────────────────────────────────────────
function toggleSettings() {
  const el = document.getElementById('settings-panel');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function saveSettings() {
  localStorage.setItem('keepa_key', document.getElementById('keepa-key').value.trim());
  localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
  showStatus('search-status', 'Einstellungen gespeichert.', 'success');
}
function clearSettings() {
  localStorage.removeItem('keepa_key');
  localStorage.removeItem('gh_token');
  document.getElementById('keepa-key').value = '';
  document.getElementById('gh-token').value = '';
  showStatus('search-status', 'Einstellungen gelöscht.', 'info');
}
function loadSettings() {
  document.getElementById('keepa-key').value = localStorage.getItem('keepa_key') || '';
  document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="status status-${type}">${msg}</div>`;
}
function clearStatus(id) {
  document.getElementById(id).innerHTML = '';
}

function extractAsin(input) {
  input = input.trim();
  if (/^[A-Z0-9]{10}$/i.test(input)) return input.toUpperCase();
  const m = input.match(/\/(?:dp|gp\/product|exec\/obidos\/ASIN)\/([A-Z0-9]{10})/i);
  return m ? m[1].toUpperCase() : null;
}

function fmtPrice(cents) {
  if (!cents || cents < 0) return '—';
  const eur = (cents / 100).toFixed(2).replace('.', ',');
  return eur + ' €';
}

function cleanName(title) {
  if (!title) return '';
  let n = title;
  if (n.includes(' | ')) n = n.split(' | ')[0];
  n = n.replace(/\s*\[(?:Alte Generation|Vorherige Generation|Previous Generation)\]\s*$/i, '');
  if (n.length > 120) {
    for (const sep of [' - ', ', ', ' / ']) {
      const parts = n.split(sep);
      const short = parts.slice(0, 4).join(sep);
      if (short.length > 30 && short.length < 120) { n = short; break; }
    }
  }
  return n.replace(/\s+/g, ' ').trim();
}

// ── Keepa API ──────────────────────────────────────────────────────────────
async function keepaQuery(asins) {
  const key = document.getElementById('keepa-key').value.trim() || localStorage.getItem('keepa_key');
  if (!key) throw new Error('Keepa API Key fehlt. Bitte in Einstellungen eingeben.');
  const url = `https://api.keepa.com/product?key=${encodeURIComponent(key)}&domain=3&asin=${asins.join(',')}`;
  const resp = await fetch(url);
  if (resp.status === 429) throw new Error('Keepa Rate-Limit erreicht. Bitte 60 Sekunden warten.');
  if (!resp.ok) throw new Error(`Keepa API Fehler: ${resp.status}`);
  const data = await resp.json();
  return data;
}

function getCurrentPrice(product) {
  const csv = product.csv;
  if (!csv) return null;
  for (const idx of [0, 1]) {
    if (csv[idx] && csv[idx].length >= 2) {
      for (let i = csv[idx].length - 1; i > 0; i -= 2) {
        if (csv[idx][i] > 0) return csv[idx][i];
      }
    }
  }
  return null;
}

function getVariations(product) {
  if (!product.variations) return [];
  return product.variations.map(v => {
    const attrs = {};
    if (v.attributes) {
      for (const a of v.attributes) {
        if (a.dimension && a.value) attrs[a.dimension] = a.value;
      }
    }
    return { asin: v.asin, attributes: attrs };
  });
}

// ── Search ─────────────────────────────────────────────────────────────────
async function searchProduct() {
  const input = document.getElementById('product-input').value;
  const asin = extractAsin(input);
  if (!asin) {
    showStatus('search-status', 'Ungültige Eingabe. Bitte Amazon-URL oder 10-stelligen ASIN eingeben.', 'error');
    return;
  }

  document.getElementById('search-btn').disabled = true;
  showStatus('search-status', `Suche ${asin} bei Keepa ...`, 'loading');

  try {
    const data = await keepaQuery([asin]);
    const products = data.products || [];
    if (!products.length) {
      showStatus('search-status', `Produkt ${asin} nicht bei Keepa gefunden.`, 'error');
      document.getElementById('search-btn').disabled = false;
      return;
    }

    parentProduct = products[0];
    parentAsin = parentProduct.parentAsin || asin;
    const variations = getVariations(parentProduct);
    const tokensLeft = data.tokensLeft || '?';

    // Collect all ASINs (parent + variants)
    const variantAsins = new Set([asin]);
    if (parentAsin !== asin) variantAsins.add(parentAsin);
    for (const v of variations) if (v.asin) variantAsins.add(v.asin);

    allVariants = [{
      asin: asin,
      name: cleanName(parentProduct.title),
      price: getCurrentPrice(parentProduct),
      attributes: {},
      isQueried: true,
    }];

    for (const v of variations) {
      if (v.asin === asin) continue;
      const attrStr = Object.values(v.attributes).join(', ');
      allVariants.push({
        asin: v.asin,
        name: attrStr ? `${cleanName(parentProduct.title)} — ${attrStr}` : v.asin,
        price: null,
        attributes: v.attributes,
        isQueried: false,
      });
    }

    showStatus('search-status',
      `${allVariants.length} Variante(n) gefunden. Parent: ${parentAsin}. Tokens verbleibend: ${tokensLeft}`,
      'success');

    renderVariants();

  } catch (e) {
    showStatus('search-status', e.message, 'error');
  }

  document.getElementById('search-btn').disabled = false;
}

// ── Render Variants ────────────────────────────────────────────────────────
function renderVariants() {
  const container = document.getElementById('variants-container');
  const list = document.getElementById('variant-list');
  container.style.display = 'block';
  document.getElementById('options-container').style.display = 'block';
  document.getElementById('submit-container').style.display = 'block';

  document.getElementById('variants-title').textContent =
    `Varianten (${allVariants.length}) — Parent: ${parentAsin}`;

  list.innerHTML = allVariants.map((v, i) => `
    <div class="variant-item">
      <input type="checkbox" id="var-${i}" checked onchange="updateCount()">
      <div style="flex:1;">
        <div class="variant-name">${v.name}</div>
        <div class="variant-attrs">${v.asin}${Object.keys(v.attributes).length ? ' — ' + Object.entries(v.attributes).map(([k,v]) => `${k}: ${v}`).join(', ') : ''}</div>
      </div>
      <div class="variant-price">${fmtPrice(v.price)}</div>
    </div>
  `).join('');

  updateCount();
}

function selectAll() {
  document.querySelectorAll('#variant-list input[type="checkbox"]').forEach(cb => cb.checked = true);
  updateCount();
}
function selectNone() {
  document.querySelectorAll('#variant-list input[type="checkbox"]').forEach(cb => cb.checked = false);
  updateCount();
}
function updateCount() {
  const checked = document.querySelectorAll('#variant-list input[type="checkbox"]:checked').length;
  document.getElementById('variant-count').textContent = `${checked} ausgewählt`;
  document.getElementById('selected-count').textContent = `${checked} Produkt(e) werden hinzugefügt`;
  document.getElementById('submit-btn').disabled = checked === 0;
}

// ── Source/Category logic ──────────────────────────────────────────────────
document.getElementById('src-apfeltalk').addEventListener('change', function() {
  document.getElementById('at-category').disabled = !this.checked;
});

// ── Build Payload ──────────────────────────────────────────────────────────
function buildPayload() {
  const selectedAsins = [];
  allVariants.forEach((v, i) => {
    if (document.getElementById(`var-${i}`).checked) {
      selectedAsins.push(v.asin);
    }
  });

  const sources = [];
  if (document.getElementById('src-apfeltalk').checked) sources.push('apfeltalk');
  if (document.getElementById('src-macwelt').checked) sources.push('macwelt');
  if (document.getElementById('src-price-tracker').checked) sources.push('price-tracker');

  const category = document.getElementById('at-category').value || null;

  return {
    asins: selectedAsins,
    sources: sources.length ? sources : ['price-tracker'],
    category: category,
    all_variants: false,
  };
}

function showJson() {
  const el = document.getElementById('json-preview');
  if (el.style.display === 'block') {
    el.style.display = 'none';
    return;
  }
  el.textContent = JSON.stringify(buildPayload(), null, 2);
  el.style.display = 'block';
}

// ── Submit via GitHub Actions ──────────────────────────────────────────────
async function submitProducts() {
  const token = document.getElementById('gh-token').value.trim() || localStorage.getItem('gh_token');
  if (!token) {
    showStatus('submit-status', 'GitHub Token (PAT) fehlt. Bitte in Einstellungen eingeben.', 'error');
    return;
  }

  const payload = buildPayload();
  if (!payload.asins.length) {
    showStatus('submit-status', 'Keine Produkte ausgewählt.', 'error');
    return;
  }

  document.getElementById('submit-btn').disabled = true;
  showStatus('submit-status', 'Trigger GitHub Actions Workflow ...', 'loading');

  try {
    const resp = await fetch(
      'https://api.github.com/repos/Finariel/claude-skills/actions/workflows/add-products.yml/dispatches',
      {
        method: 'POST',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          ref: 'main',
          inputs: {
            payload: JSON.stringify(payload),
          },
        }),
      }
    );

    if (resp.status === 204) {
      showStatus('submit-status',
        `Workflow gestartet! ${payload.asins.length} ASIN(s) werden hinzugefügt. ` +
        `<a href="https://github.com/Finariel/claude-skills/actions" target="_blank" style="color:inherit;">Actions ansehen</a>`,
        'success');
    } else {
      const err = await resp.json().catch(() => ({}));
      showStatus('submit-status', `GitHub API Fehler ${resp.status}: ${err.message || 'Unbekannt'}`, 'error');
    }
  } catch (e) {
    showStatus('submit-status', `Netzwerkfehler: ${e.message}`, 'error');
  }

  document.getElementById('submit-btn').disabled = false;
}

// ── Init ───────────────────────────────────────────────────────────────────
loadSettings();

// Enter-Taste zum Suchen
document.getElementById('product-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchProduct();
});
</script>
</body>
</html>
